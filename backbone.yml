# Navigation map of the Converter codebase.
# Keep this file up to date whenever files are added, moved, or removed.

project:
  name: converter
  description: Vue 3 SPA converting temperatures and currencies (live rates from the Frankfurter API)
  stack: [Vue 3.5, TypeScript 5.9, Vite 8, Vue Router 4, Tailwind CSS v4, Vitest]

entry:
  index.html: Vite HTML entry, mounts #app
  src/main.ts: Creates the Vue app, installs the router, imports global CSS
  src/App.vue: Root layout, renders NavBar and RouterView

routing:
  src/router/modules.ts: Module registry (path, name, label, description, lucide icon) feeding NavBar links and HomeView cards
  src/router/index.ts: |
    Routes (all lazy-loaded views):
      /            -> redirect /home
      /home        -> HomeView
      /temperature -> TemperatureView
      /currencies  -> CurrenciesView
      /bases       -> BasesView
      /units       -> UnitsView
      /data        -> DataSizeView
      catch-all    -> redirect /home

views:
  src/views/HomeView.vue: Landing page, responsive card grid driven by the module registry
  src/views/HomeView.spec.ts: Component test for the module card grid
  src/views/TemperatureView.vue: Celsius/Fahrenheit/Kelvin converter with copy-to-clipboard
  src/views/CurrenciesView.vue: Currency converter with live rates, swap button, delta indicator, historical date mode, multi-target rate board, copy amount / copy share link, rate history chart; pair/amount/range/date/board synced to URL query
  src/views/CurrenciesView.spec.ts: Component test for swap/URL sync and delta rendering
  src/views/BasesView.vue: Number base converter (binary/octal/decimal/hex), unsigned BigInt
  src/views/BasesView.spec.ts: Component test for field sync and error/aria wiring
  src/views/UnitsView.vue: Length and mass converters driven by useUnitConverter
  src/views/UnitsView.spec.ts: Component test for the length/mass panels
  src/views/DataSizeView.vue: Data size converter (bits/bytes, decimal and binary prefixes)
  src/views/DataSizeView.spec.ts: Component test for the data size panel

components:
  src/components/NavBar.vue: Top navigation, Home plus links derived from the module registry (Temperature, Currencies, Units, Bases, Data)
  src/components/NavBar.spec.ts: Component test for NavBar
  src/components/RateChart.vue: SVG line chart of exchange-rate history, hover tooltip, min/max/avg reference lines, range percent-change header

composables:
  src/composables/useTemperatureConverter.ts: Pure conversion functions + reactive C/F/K state
  src/composables/useTemperatureConverter.spec.ts: Tests for conversions and sync logic
  src/composables/useCurrencyRates.ts: Currency list, selected/target currency, amount conversion, unit/inverse rates, rate date, previous-day delta, swapCurrencies, historical conversionDate mode
  src/composables/useCurrencyRates.spec.ts: Tests with mocked fetch
  src/composables/useRateHistory.ts: Loads historical rate points for a base/target pair, range presets (1M/3M/1Y), stale-request guard
  src/composables/useRateHistory.spec.ts: Tests with mocked fetch
  src/composables/useClipboard.ts: navigator.clipboard wrapper with transient copied flag
  src/composables/useUnitConverter.ts: Generic linear-unit converter, pure convertUnit(value, from, to, factors) + stateful composable over a UnitModule definition
  src/composables/useUnitConverter.spec.ts: Tests for factor math and composable state
  src/composables/useBaseConverter.ts: Pure BigInt parse/format per base + reactive binary/octal/decimal/hex sync with per-field error state
  src/composables/useBaseConverter.spec.ts: Tests for base round-trips, invalid input, 64-bit values
  src/composables/unitModules.ts: Factor tables (UnitModule data) for length, mass, and data size
  src/composables/unitModules.spec.ts: Factor-table sanity tests
  src/composables/useQuerySync.ts: Generic ref/route-query sync (fromQuery validates, toQuery omits defaults, router.replace)
  src/composables/useQuerySync.spec.ts: Tests for query/ref sync, fallback, loop guard
  src/composables/chartStats.ts: Pure series stats (min/max/average) and percent-change helpers
  src/composables/chartStats.spec.ts: Tests for series stats and percent change
  src/composables/useRateBoard.ts: Multi-target rate board (validated basket, one latest + one dated fetch, per-target deltas, stale-request guard)
  src/composables/useRateBoard.spec.ts: Tests for basket validation, fetch batching, deltas
  src/composables/formatCurrency.ts: Pure Intl.NumberFormat currency formatter
  src/composables/formatCurrency.spec.ts: Tests for currency formatting

services:
  src/services/exchangeRates.ts: fetchRates(base, symbols?), fetchRatesOn(date, base, symbols?), fetchRateHistory() against https://api.frankfurter.dev/v1

types:
  src/types/currency.ts: Currency, ExchangeRatesResponse, RateHistoryResponse, RatePoint
  src/types/units.ts: UnitDefinition and UnitModule interfaces for factor-based converters
  src/env.d.ts: Vite client type references

assets:
  src/assets/main.css: Tailwind v4 entry + theme tokens (dark instrument design) + global styles
  src/assets/simplifica.ttf: Simplifica display font
  public/favicon.ico: Favicon

config:
  package.json: Scripts and dependencies (npm)
  vite.config.ts: Vite config (Vue plugin, Tailwind plugin, '@' alias, Vitest jsdom setup)
  tsconfig.json: Solution-style root referencing app and node configs
  tsconfig.app.json: App TS config ('@' path alias)
  tsconfig.node.json: TS config for Vite config files
  .oxlintrc.json: oxlint rules
  .prettierrc.json: Prettier config
  .editorconfig: Editor defaults

claude:
  CLAUDE.md: Project instructions for Claude Code
  .claude/agents/: Curated project subagents (frontend, tests, review, a11y, perf, security, deps, TS, UI, Vue)

planning:
  tasks/README.md: Roadmap overview, architecture principles, definition of done, phase 0 housekeeping
  tasks/01-breadth.md: Phase 1 tasks, generic unit-converter core + new conversion modules
  tasks/02-depth.md: Phase 2 tasks, richer currency tooling (URL state, deltas, history, rate board, chart)
  tasks/03-stickiness.md: Phase 3 tasks, localStorage persistence, rate caching/offline, PWA decision gate
